<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultra Warriors Z - Battle Arena</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<canvas id="gameCanvas"></canvas>


<!-- MENÚ PRINCIPAL -->
<div id="menu">

<h1>ULTRA WARRIORS Z</h1>

<button onclick="startMode('cpu')">
BATALLA VS CPU
</button>

<button onclick="startMode('pvp')">
2 JUGADORES
</button>


<div id="characterBox">

<h2>ELIGE GUERRERO</h2>

<div id="characters"></div>

</div>

</div>



<!-- HUD -->

<div id="hud">

<div class="player">

<h3 id="name1">
GUERRERO 1
</h3>

<div class="bar">
<div id="life1"></div>
</div>

<div class="ki">
<div id="ki1"></div>
</div>

</div>



<div class="player right">

<h3 id="name2">
GUERRERO 2
</h3>

<div class="bar">
<div id="life2"></div>
</div>

<div class="ki">
<div id="ki2"></div>
</div>

</div>

</div>



<!-- MENSAJE DE ATAQUES -->

<div id="message">
</div>



<!-- CONTROLES MÓVILES -->

<div id="mobileControls">


<div class="left">

<button ontouchstart="press('a')" ontouchend="release('a')">
◀
</button>

<button ontouchstart="press('d')" ontouchend="release('d')">
▶
</button>

<button ontouchstart="press('w')" ontouchend="release('w')">
▲
</button>

<button ontouchstart="press('s')" ontouchend="release('s')">
▼
</button>

</div>



<div class="right">

<button ontouchstart="press('j')" ontouchend="release('j')">
PUÑO
</button>

<button ontouchstart="press('k')" ontouchend="release('k')">
KI
</button>

<button ontouchstart="press('l')" ontouchend="release('l')">
CARGAR
</button>

</div>


</div>



<script src="game.js"></script>

</body>
</html>
